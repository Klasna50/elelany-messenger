name: Build and release desktop apps

# Publishes a new version to GitHub Releases whenever you push a tag like v1.0.1.
# Installed apps poll that release feed and update themselves.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Let electron-builder upload installers to the GitHub Release.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: --mac
          - os: windows-latest
            target: --win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        run: npx electron-builder ${{ matrix.target }} --publish always
        env:
          # Baked into the renderer bundle at build time.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

          # Lets electron-builder upload the release assets.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # macOS signing (required for auto-update to work on macOS).
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}

          # macOS notarization (removes the "unidentified developer" warning).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

          # Windows signing (optional; removes SmartScreen warning).
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
