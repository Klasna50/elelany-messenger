name: Build and release desktop apps

# Publishes a new version to GitHub Releases whenever you push a tag like v1.0.1.
# Installed apps poll that release feed and update themselves.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Let electron-builder upload installers to the GitHub Release.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: --mac
          - os: windows-latest
            target: --win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build the React/Vite web bundle FIRST. This is what gets packaged inside
      # the desktop app. The Supabase keys are baked in at THIS step (build time).
      - name: Build web bundle
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # Package the Electron app around dist/, then sign, notarize, and publish.
      - name: Package and publish desktop app
        run: npx electron-builder ${{ matrix.target }} --publish always
        env:
          # Lets electron-builder upload the release assets.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # macOS signing (required for auto-update to work on macOS).
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}

          # macOS notarization (removes the "unidentified developer" warning).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

          # Windows signing (optional; removes SmartScreen warning).
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

  # The website is the same bundle the desktop apps wrap, so it ships from the
  # same tag. Without this the site silently falls behind the desktop apps,
  # which is exactly what happened between v1.1.1 and v1.1.6.
  deploy-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # Fail loudly rather than publishing a site with no Supabase keys, which
      # looks like a working page that can never sign anyone in.
      - name: Check the bundle has Supabase keys
        run: |
          if ! grep -rq "supabase.co" dist/assets/*.js; then
            echo "::error::Built bundle contains no Supabase URL. Check the VITE_SUPABASE_* secrets."
            exit 1
          fi

      - name: Deploy to Netlify
        run: npx --yes netlify-cli@17 deploy --prod --dir=dist --message "${{ github.ref_name }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
