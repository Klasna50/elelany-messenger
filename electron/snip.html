<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; cursor: crosshair; user-select: none; }
      #shot { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; -webkit-user-drag: none; }
      #dim { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.45); }
      #sel {
        position: absolute; display: none; border: 2px solid #fb923c;
        box-shadow: 0 0 0 9999px rgba(15, 23, 42, 0.45); border-radius: 4px;
      }
      #size {
        position: absolute; display: none; transform: translateY(-30px);
        background: #fb923c; color: #fff; font: 700 12px -apple-system, Segoe UI, sans-serif;
        padding: 4px 10px; border-radius: 999px; white-space: nowrap;
      }
      #hint {
        position: absolute; top: 26px; left: 50%; transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.96); color: #0f172a; border-radius: 14px;
        padding: 10px 18px; font: 600 13px -apple-system, Segoe UI, sans-serif;
        box-shadow: 0 12px 34px rgba(15, 23, 42, 0.3);
      }
    </style>
  </head>
  <body>
    <img id="shot" alt="" />
    <div id="dim"></div>
    <div id="sel"></div>
    <div id="size"></div>
    <div id="hint">Drag to select an area &nbsp;·&nbsp; Esc to cancel</div>

    <script>
      const shot = document.getElementById("shot");
      const dim = document.getElementById("dim");
      const sel = document.getElementById("sel");
      const sizeTag = document.getElementById("size");
      const hint = document.getElementById("hint");

      window.snipAPI.getImage().then((src) => {
        if (src) shot.src = src;
      });

      let startX = 0;
      let startY = 0;
      let dragging = false;

      const rectFrom = (x1, y1, x2, y2) => ({
        x: Math.min(x1, x2),
        y: Math.min(y1, y2),
        width: Math.abs(x2 - x1),
        height: Math.abs(y2 - y1),
      });

      const paint = (r) => {
        sel.style.display = "block";
        sel.style.left = r.x + "px";
        sel.style.top = r.y + "px";
        sel.style.width = r.width + "px";
        sel.style.height = r.height + "px";

        sizeTag.style.display = "block";
        sizeTag.style.left = r.x + "px";
        sizeTag.style.top = r.y + "px";
        sizeTag.textContent = Math.round(r.width) + " x " + Math.round(r.height);
      };

      window.addEventListener("mousedown", (e) => {
        dragging = true;
        startX = e.clientX;
        startY = e.clientY;
        dim.style.display = "none";
        hint.style.display = "none";
        paint(rectFrom(startX, startY, startX, startY));
      });

      window.addEventListener("mousemove", (e) => {
        if (!dragging) return;
        paint(rectFrom(startX, startY, e.clientX, e.clientY));
      });

      window.addEventListener("mouseup", (e) => {
        if (!dragging) return;
        dragging = false;
        const r = rectFrom(startX, startY, e.clientX, e.clientY);
        if (r.width < 4 || r.height < 4) {
          window.snipAPI.cancel();
          return;
        }
        window.snipAPI.done(r);
      });

      window.addEventListener("keydown", (e) => {
        if (e.key === "Escape") window.snipAPI.cancel();
      });

      window.focus();
    </script>
  </body>
</html>
